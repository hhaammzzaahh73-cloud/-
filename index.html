<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أبطال السيرة</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A3A5C">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #1A3A5C;
  color: white;
  padding: 20px;
}
button {
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  background: gold;
  font-size: 18px;
}
</style>

</head>
<body>

<h1>أبطال السيرة</h1>
<p>رحلة ممتعة لتعلم السيرة النبوية</p>

<button onclick="start()">ابدأ</button>

<div id="app" style="display:none;">
  <h2 id="question"></h2>
  <div id="answers"></div>
</div>

<script>
const questions = [
  {
    q: "أين ولد النبي ﷺ؟",
    a: ["مكة","المدينة","الشام","مصر"],
    c: 0
  },
  {
    q: "من أول من آمن؟",
    a: ["أبو بكر","خديجة","عمر","علي"],
    c: 1
  }
];

let current = 0;

function start(){
  document.getElementById("app").style.display = "block";
  showQuestion();
}

function showQuestion(){
  let q = questions[current];
  document.getElementById("question").innerText = q.q;

  let html = "";
  q.a.forEach((ans,i)=>{
    html += `<button onclick="answer(${i})">${ans}</button><br>`;
  });

  document.getElementById("answers").innerHTML = html;
}

function answer(i){
  if(i === questions[current].c){
    alert("إجابة صحيحة 👍");
  } else {
    alert("إجابة خاطئة ❌");
  }

  current++;
  if(current < questions.length){
    showQuestion();
  } else {
    alert("انتهت المرحلة 🎉");
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
